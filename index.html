<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Into The Void - A Deathcore Opera</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0b10;
            font-family: 'VT323', monospace;
        }

        /* Main container for the background image */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Background image with object-fit: contain */
        .background-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            user-select: none;
        }

        /* Wrapper that matches the rendered image dimensions */
        .overlay-wrapper {
            position: absolute;
            pointer-events: none;
        }

        /* Monitor screen area overlay */
        .monitor-screen {
            position: absolute;
            left: 29.5%;
            top: 13%;
            width: 42.5%; /* 72% - 29.5% */
            height: 69%; /* 82% - 13% */
            border-radius: 6px;
            pointer-events: auto;
            overflow: hidden;
            /* Placeholder for CRT effects and terminal content */
        }

        /* Terminal container inside the screen */
        .terminal-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Terminal content will be added here */
        }

        /* Monitor power button overlay */
        .power-button {
            position: absolute;
            left: calc(66% - 1.5%);
            top: calc(89.5% - 1.75%);
            width: 3%;
            height: 3.5%;
            cursor: pointer;
            pointer-events: auto;
            border-radius: 50%;
            /* Debug: uncomment to see hitbox */
            /* background: rgba(255, 0, 0, 0.3); */
        }

        .power-button:hover {
            /* TODO: Add hover effect */
        }

        /* Power LED indicator */
        .power-led {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: #33ff33;
            border-radius: 50%;
            box-shadow: 0 0 8px #33ff33;
            opacity: 0;
            pointer-events: none;
        }

        .power-led.active {
            opacity: 0.8;
            animation: ledPulse 2s ease-in-out infinite;
        }

        @keyframes ledPulse {
            0%, 100% {
                opacity: 0.8;
            }
            50% {
                opacity: 1;
            }
        }

        /* Lamp pull chain overlay */
        .lamp-chain {
            position: absolute;
            left: calc(17% - 2%);
            top: calc(52% - 7%);
            width: 4%;
            height: 14%;
            cursor: pointer;
            pointer-events: auto;
            /* Debug: uncomment to see hitbox */
            /* background: rgba(0, 255, 0, 0.3); */
        }

        .lamp-chain:hover {
            /* TODO: Add hover effect */
        }

        /* Lamp glow effect (initially hidden) */
        .lamp-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            /* Warm ambient glow covering left third of image */
            background: radial-gradient(
                ellipse 50% 70% at 18% 16%,
                rgba(255, 180, 80, 0.10) 0%,
                rgba(255, 160, 60, 0.05) 40%,
                transparent 70%
            );
        }

        /* Brighter spot at bulb position */
        .lamp-glow::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse 12% 10% at 18% 16%,
                rgba(255, 200, 100, 0.20) 0%,
                rgba(255, 180, 80, 0.10) 50%,
                transparent 100%
            );
            pointer-events: none;
        }

        .lamp-glow.active {
            opacity: 1;
        }

        /* ========================================
           CRT Power-On Animation Styles
           ======================================== */

        /* White flash overlay for CRT turn-on */
        .crt-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .crt-flash.active {
            animation: crtFlash 250ms ease-out forwards;
        }

        @keyframes crtFlash {
            0% {
                opacity: 0;
            }
            30% {
                opacity: 0.25;
            }
            100% {
                opacity: 0;
            }
        }

        /* Terminal screen with clip-path expansion */
        .terminal-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            clip-path: inset(50% 0 50% 0);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        .terminal-screen.expanding {
            opacity: 1;
            animation: crtExpand 0.6s ease-out forwards;
        }

        .terminal-screen.expanded {
            opacity: 1;
            clip-path: inset(0 0 0 0);
            pointer-events: auto;
        }

        @keyframes crtExpand {
            0% {
                clip-path: inset(50% 0 50% 0);
            }
            100% {
                clip-path: inset(0 0 0 0);
            }
        }

        /* Bright horizontal line glow during expansion */
        .terminal-screen.expanding::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: #fff;
            box-shadow: 0 0 20px 5px rgba(255, 255, 255, 0.8),
                        0 0 40px 10px rgba(200, 220, 255, 0.5);
            transform: translateY(-50%);
            animation: lineGlow 0.6s ease-out forwards;
        }

        @keyframes lineGlow {
            0% {
                opacity: 1;
                height: 2px;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                opacity: 0;
                height: 4px;
            }
        }

        /* ========================================
           CRT Screen Overlay Effects
           (Scanlines, Glare, Flicker)
           ======================================== */

        /* Screen glare effect (::before) - light reflection on glass */
        .terminal-screen.expanded::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 100;
        }

        /* Scanlines effect (::after) - horizontal lines */
        .terminal-screen.expanded::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.15) 0px,
                rgba(0,0,0,0.15) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 101;
        }

        /* Flicker effect - controlled via JavaScript */
        .terminal-screen.flicker {
            opacity: 0.97 !important;
        }

        /* ========================================
           Terminal Boot Sequence Styles
           ======================================== */

        /* Terminal output container */
        .terminal-output {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 12px 16px;
            overflow: hidden;
            font-family: 'VT323', monospace;
            font-size: clamp(10px, 1.4vw, 18px);
            line-height: 1.3;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Text color classes */
        .text-dim-green {
            color: #1a8a1a;
            text-shadow: 0 0 6px rgba(51, 255, 51, 0.3);
        }

        .text-bright-green {
            color: #33ff33;
            text-shadow: 0 0 6px rgba(51, 255, 51, 0.3);
        }

        .text-red {
            color: #ff3333;
            text-shadow: 0 0 6px rgba(255, 51, 51, 0.3);
        }

        .text-amber {
            color: #ffb347;
            text-shadow: 0 0 6px rgba(255, 179, 71, 0.3);
        }

        /* Terminal line styling */
        .terminal-line {
            display: block;
            min-height: 1.3em;
        }

        /* Blinking cursor */
        .cursor {
            display: inline-block;
            background: #33ff33;
            width: 0.6em;
            height: 1em;
            vertical-align: text-bottom;
            animation: cursorBlink 1.06s step-end infinite;
        }

        @keyframes cursorBlink {
            0%, 50% {
                opacity: 1;
            }
            50.01%, 100% {
                opacity: 0;
            }
        }

        /* Boot complete state flag */
        .terminal-screen.boot-complete .cursor {
            /* Cursor remains visible and blinking when boot is complete */
        }
    </style>
</head>
<body>
    <div class="background-container">
        <img
            src="Images/deskMonitor.png"
            alt="Retro CRT Monitor Setup"
            class="background-image"
            id="bgImage"
        >

        <!-- Overlay wrapper - positioned to match rendered image bounds -->
        <div class="overlay-wrapper" id="overlayWrapper">
            <!-- Monitor screen area -->
            <div class="monitor-screen" id="monitorScreen">
                <div class="terminal-container" id="terminalContainer">
                    <!-- CRT white flash effect -->
                    <div class="crt-flash" id="crtFlash"></div>

                    <!-- Terminal screen with clip-path animation -->
                    <div class="terminal-screen" id="terminalScreen">
                        <!-- Terminal output for boot sequence -->
                        <div class="terminal-output" id="terminalOutput"></div>
                    </div>
                </div>
            </div>

            <!-- Monitor power button -->
            <div class="power-button" id="powerButton" role="button" aria-label="Monitor Power Button">
                <div class="power-led" id="powerLed"></div>
            </div>

            <!-- Lamp pull chain - click to toggle lamp glow -->
            <div class="lamp-chain" id="lampChain" role="button" aria-label="Lamp Pull Chain"></div>

            <!-- Lamp glow effect overlay - warm radial gradient from bulb position -->
            <div class="lamp-glow" id="lampGlow"></div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // DOM Elements
            const bgImage = document.getElementById('bgImage');
            const overlayWrapper = document.getElementById('overlayWrapper');
            const monitorScreen = document.getElementById('monitorScreen');
            const terminalContainer = document.getElementById('terminalContainer');
            const crtFlash = document.getElementById('crtFlash');
            const terminalScreen = document.getElementById('terminalScreen');
            const powerButton = document.getElementById('powerButton');
            const powerLed = document.getElementById('powerLed');
            const lampChain = document.getElementById('lampChain');
            const lampGlow = document.getElementById('lampGlow');

            // State flags
            let isPoweredOn = false;
            let flickerIntervalId = null;

            // Image dimensions (original)
            const IMAGE_WIDTH = 2000;
            const IMAGE_HEIGHT = 1396;
            const IMAGE_ASPECT_RATIO = IMAGE_WIDTH / IMAGE_HEIGHT;

            /**
             * Calculate the rendered image bounds accounting for object-fit: contain
             * Returns the actual pixel position and size of the rendered image
             */
            function calculateImageBounds() {
                const containerWidth = window.innerWidth;
                const containerHeight = window.innerHeight;
                const containerAspectRatio = containerWidth / containerHeight;

                let renderedWidth, renderedHeight, offsetX, offsetY;

                if (containerAspectRatio > IMAGE_ASPECT_RATIO) {
                    // Container is wider than image - letterboxing on sides
                    renderedHeight = containerHeight;
                    renderedWidth = containerHeight * IMAGE_ASPECT_RATIO;
                    offsetX = (containerWidth - renderedWidth) / 2;
                    offsetY = 0;
                } else {
                    // Container is taller than image - letterboxing on top/bottom
                    renderedWidth = containerWidth;
                    renderedHeight = containerWidth / IMAGE_ASPECT_RATIO;
                    offsetX = 0;
                    offsetY = (containerHeight - renderedHeight) / 2;
                }

                return {
                    width: renderedWidth,
                    height: renderedHeight,
                    left: offsetX,
                    top: offsetY
                };
            }

            /**
             * Update the overlay wrapper position to match the rendered image bounds
             */
            function updateOverlayPosition() {
                const bounds = calculateImageBounds();

                overlayWrapper.style.width = bounds.width + 'px';
                overlayWrapper.style.height = bounds.height + 'px';
                overlayWrapper.style.left = bounds.left + 'px';
                overlayWrapper.style.top = bounds.top + 'px';
            }

            /**
             * Initialize the page
             */
            function init() {
                // Update overlay position on load
                updateOverlayPosition();

                // Update overlay position on window resize
                window.addEventListener('resize', updateOverlayPosition);

                // Set up click handlers
                setupEventListeners();

                console.log('Into The Void - Initialized');
            }

            /**
             * Set up event listeners for interactive elements
             */
            function setupEventListeners() {
                // Power button click handler
                powerButton.addEventListener('click', function(e) {
                    e.preventDefault();
                    handlePowerButtonClick();
                });

                // Lamp chain click handler
                lampChain.addEventListener('click', function(e) {
                    e.preventDefault();
                    handleLampChainClick();
                });
            }

            /**
             * Handle power button click
             * Only triggers once - subsequent clicks are ignored
             */
            function handlePowerButtonClick() {
                // Prevent re-triggering if already powered on
                if (isPoweredOn) {
                    return;
                }

                // Set powered on state
                isPoweredOn = true;

                // Activate the LED indicator with pulsing animation
                powerLed.classList.add('active');

                // Change cursor to default since button is no longer interactive
                powerButton.style.cursor = 'default';

                console.log('Power button activated - LED on');

                // Trigger the CRT power-on animation sequence
                triggerCRTPowerOn();
            }

            /**
             * Trigger the CRT power-on sequence
             * Animation sequence:
             * 1. Wait 200ms after LED appears
             * 2. White flash (250ms)
             * 3. Horizontal line expansion via clip-path (600ms)
             * 4. Terminal ready for boot sequence content
             */
            function triggerCRTPowerOn() {
                console.log('CRT power-on sequence starting...');

                // Step 1: Wait 200ms after LED appears before starting CRT animation
                setTimeout(function() {
                    // Step 2: Trigger white flash
                    crtFlash.classList.add('active');
                    console.log('CRT flash triggered');

                    // Step 3: Start horizontal line expansion after brief flash buildup (~100ms)
                    setTimeout(function() {
                        terminalScreen.classList.add('expanding');
                        console.log('CRT expansion started');

                        // Step 4: After expansion animation completes (600ms), finalize state
                        setTimeout(function() {
                            terminalScreen.classList.remove('expanding');
                            terminalScreen.classList.add('expanded');
                            console.log('CRT expansion complete - terminal ready');

                            // Remove flash element class after animation
                            crtFlash.classList.remove('active');

                            // Start CRT screen flicker effect
                            startScreenFlicker();

                            // Start boot sequence text animation
                            startBootSequence();
                        }, 600);

                    }, 100);

                }, 200);
            }

            /**
             * Handle lamp chain click - toggles warm glow effect
             */
            function handleLampChainClick() {
                lampGlow.classList.toggle('active');
            }

            /**
             * Start the random screen flicker effect
             * Flickers the screen opacity every 3-6 seconds (randomized)
             */
            function startScreenFlicker() {
                function triggerFlicker() {
                    // Add flicker class to dip opacity
                    terminalScreen.classList.add('flicker');

                    // Remove flicker class after 100ms
                    setTimeout(function() {
                        terminalScreen.classList.remove('flicker');
                    }, 100);

                    // Schedule next flicker at random interval (3000-6000ms)
                    const nextFlickerDelay = 3000 + Math.random() * 3000;
                    flickerIntervalId = setTimeout(triggerFlicker, nextFlickerDelay);
                }

                // Start the first flicker after initial random delay
                const initialDelay = 3000 + Math.random() * 3000;
                flickerIntervalId = setTimeout(triggerFlicker, initialDelay);

                console.log('Screen flicker effect started');
            }

            /* ========================================
               Terminal Boot Sequence Functions
               ======================================== */

            // Terminal output element reference
            const terminalOutput = document.getElementById('terminalOutput');

            // Boot sequence state
            let isBootComplete = false;

            /**
             * Helper function for async delays
             * @param {number} ms - Milliseconds to wait
             * @returns {Promise}
             */
            function delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            /**
             * Type text with typewriter effect
             * @param {string} text - Text to type
             * @param {string} colorClass - CSS class for text color
             * @param {number} speed - Milliseconds per character (default: 35)
             * @returns {Promise}
             */
            async function typeText(text, colorClass, speed = 35) {
                const span = document.createElement('span');
                span.className = colorClass;
                terminalOutput.appendChild(span);

                for (let i = 0; i < text.length; i++) {
                    span.textContent += text[i];
                    await delay(speed);
                }
            }

            /**
             * Type a line of text followed by newline
             * @param {string} text - Text to type
             * @param {string} colorClass - CSS class for text color
             * @param {number} speed - Milliseconds per character
             * @returns {Promise}
             */
            async function typeLine(text, colorClass, speed = 35) {
                await typeText(text + '\n', colorClass, speed);
            }

            /**
             * Display text instantly (no typewriter effect)
             * @param {string} text - Text to display
             * @param {string} colorClass - CSS class for text color
             */
            function displayInstant(text, colorClass) {
                const span = document.createElement('span');
                span.className = colorClass;
                span.textContent = text;
                terminalOutput.appendChild(span);
            }

            /**
             * Clear the terminal screen
             */
            function clearScreen() {
                terminalOutput.innerHTML = '';
            }

            /**
             * Add blinking cursor to terminal
             */
            function addCursor() {
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                cursor.innerHTML = '&nbsp;';
                terminalOutput.appendChild(cursor);
            }

            /**
             * Main boot sequence - orchestrates all phases
             */
            async function startBootSequence() {
                console.log('Boot sequence starting...');

                // Phase 1 - BIOS (dim green)
                await typeLine('BIOS v2.14 ... OK', 'text-dim-green');
                await delay(100);
                await typeLine('MEM TEST: 640K CONVENTIONAL / 3072K EXTENDED ... OK', 'text-dim-green');
                await delay(100);
                await typeLine('DETECTING DRIVES ...', 'text-dim-green');
                await delay(100);
                await typeLine('  HDD0: MAXTOR 540MB [OK]', 'text-dim-green');
                await delay(100);
                await typeLine('  FDD0: 3.5" 1.44MB [OK]', 'text-dim-green');
                await delay(100);
                await typeLine('  CD-ROM: GENERIC 4X [NOT FOUND]', 'text-dim-green');
                await delay(100);
                await typeLine('', 'text-dim-green');
                await typeLine('LOADING SYSTEM ...', 'text-dim-green');

                // Phase 2 - 500ms pause, clear screen, VOID_OS display (bright green)
                await delay(500);
                clearScreen();
                await typeLine('VOID_OS v0.1.7 (BUILD 001)', 'text-bright-green');
                await delay(100);
                await typeLine('SYS_DATE: 10/31/1997', 'text-bright-green');
                await delay(100);
                await typeLine('NODE: TERMINAL_07', 'text-bright-green');
                await delay(100);
                await typeLine('STATUS: ███████████ ONLINE', 'text-bright-green');

                // Phase 3 - 600ms pause, unauthorized transmission (red)
                await delay(600);
                await typeLine('', 'text-red');
                // Glitch placeholder hook - feature-6 will add glitch effect here
                // window.triggerGlitchEffect && window.triggerGlitchEffect();
                await typeLine('[UNAUTHORIZED TRANSMISSION DETECTED]', 'text-red');

                // Phase 4 - 400ms pause, source info (dim green, slower ~55ms/char)
                await delay(400);
                await typeLine('', 'text-dim-green');
                await typeLine('SOURCE: UNKNOWN', 'text-dim-green', 55);
                await typeLine('ORIGIN: THE UNDERGROUND /// NEW YORK CITY', 'text-dim-green', 55);
                await typeLine('SIGNAL: ██████████ LOCKED', 'text-dim-green', 55);

                // Phase 5 - 500ms pause, (glitch placeholder), title display (amber, instant)
                await delay(500);
                // Glitch placeholder hook - feature-6 will add brief glitch here
                // window.triggerBriefGlitch && window.triggerBriefGlitch();
                await typeLine('', 'text-amber');
                displayInstant('═══════════════════════════════════════\n', 'text-amber');
                displayInstant('  INTO THE VOID\n', 'text-amber');
                displayInstant('  A Deathcore Opera\n', 'text-amber');
                displayInstant('═══════════════════════════════════════\n', 'text-amber');

                // Phase 6 - 300ms pause, credits (bright green, normal speed)
                await delay(300);
                await typeLine('', 'text-bright-green');
                await typeLine('  Presented by VOID_TERMINAL.EXE', 'text-bright-green');
                await typeLine('  Sponsored by PromptCo Industries', 'text-bright-green');
                await typeLine('  "We were listening before you spoke."', 'text-bright-green');
                await typeLine('', 'text-bright-green');
                await typeLine('  Starring:', 'text-bright-green');
                await typeLine('    LA MORRIGAN — The Phantom Queen', 'text-bright-green');
                await typeLine('    QUINN — The Founder', 'text-bright-green');

                // Phase 7 - 200ms pause, warning (red)
                await delay(200);
                await typeLine('', 'text-red');
                await typeLine('  WARNING: THIS PERFORMANCE CANNOT BE UNSEEN', 'text-red');

                // Phase 8 - 400ms pause, tagline (bright green)
                await delay(400);
                await typeLine('', 'text-bright-green');
                await typeLine('  "Hack the void."', 'text-bright-green');

                // Final - 800ms pause, clear screen, 300ms pause, ready prompt
                await delay(800);
                clearScreen();
                await delay(300);
                await typeLine('VOID_OS v0.1.7 — READY', 'text-bright-green');
                await typeLine('', 'text-bright-green');
                displayInstant('void@terminal_07:~$ ', 'text-bright-green');

                // Add blinking cursor
                addCursor();

                // Mark boot as complete
                isBootComplete = true;
                terminalScreen.classList.add('boot-complete');
                console.log('Boot sequence complete');
            }

            // Wait for image to load before initializing
            if (bgImage.complete) {
                init();
            } else {
                bgImage.addEventListener('load', init);
            }

            // Also handle potential load issues
            bgImage.addEventListener('error', function() {
                console.error('Failed to load background image');
            });
        })();
    </script>
</body>
</html>
